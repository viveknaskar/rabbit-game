<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Run!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p id="game-title">Rabbit Run!</p>
    <div id="hud" role="status" aria-live="polite" aria-label="Game scores">
        <div id="score"><span id="score-label">SCORE</span><span id="score-value" aria-label="Current score">0</span></div>
        <div id="best"><span id="best-label">BEST</span><span id="best-value" aria-label="Best score">0</span></div>
    </div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas" width="800" height="200"
            role="application"
            aria-label="Rabbit Run game. Press Space to jump, P to pause, R to restart."
            tabindex="0"></canvas>
        <div id="difficulty-screen" role="dialog" aria-labelledby="diff-title">
            <p id="diff-title">SELECT DIFFICULTY</p>
            <div id="diff-buttons" role="group" aria-label="Difficulty options">
                <button class="diff-btn" data-mode="easy" aria-label="Easy difficulty">EASY</button>
                <button class="diff-btn" data-mode="normal" aria-label="Normal difficulty">NORMAL</button>
                <button class="diff-btn" data-mode="hard" aria-label="Hard difficulty">HARD</button>
            </div>
        </div>
    </div>
    <p id="hint" aria-label="Controls"><kbd>SPACE</kbd> / TAP to jump &nbsp;|&nbsp; <kbd>P</kbd> to pause &nbsp;|&nbsp; <kbd>R</kbd> to restart / resume &nbsp;|&nbsp; <kbd>M</kbd> to mute</p>
    <div id="volume-row">
        <label for="volume-slider" id="volume-label">🔊</label>
        <input type="range" id="volume-slider" min="0" max="100" value="100" step="1" aria-label="Music volume">
    </div>

    <script src="music.js"></script>
    <script src="game.js"></script>
</body>
</html>
