<!DOCTYPE html>
<html>
<head>
    <title>Rabbit Run!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="score"><span id="score-label">SCORE</span><span id="score-value">0</span></div>
        <div id="best"><span id="best-label">BEST</span><span id="best-value">0</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="200"></canvas>
    <p id="hint"><kbd>SPACE</kbd> to jump &nbsp;|&nbsp; <kbd>R</kbd> to restart &nbsp;|&nbsp; <kbd>M</kbd> to mute</p>

    <script src="music.js"></script>
    <script src="game.js"></script>
</body>
</html>
